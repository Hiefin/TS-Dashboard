<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg: #0e0e0e; --s: #181818; --b: #2a2a2a; --t: #e8e8e8; --m: #555; --a: #4f86c6; }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            background: var(--bg);
            color: var(--t);
            padding: 24px;
        }

        /* shared label style, used on headings and card titles */
        .label {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--m);
            font-weight: 400;
        }

        /* shared surface style, used on metric, card, emitter */
        .surface {
            background: var(--s);
            border: 1px solid var(--b);
            border-radius: 5px;
            padding: 14px 16px;
        }

        /* grids, 4 col for metrics, 2 col and 1.4/1 for charts */
        .grid4  { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--b); border: 1px solid var(--b); border-radius: 5px; overflow: hidden; margin-bottom: 12px; }
        .grid2  { display: grid; grid-template-columns: 1fr 1fr;      gap: 10px; margin-bottom: 10px; }
        .grid21 { display: grid; grid-template-columns: 1.4fr 1fr;    gap: 10px; margin-bottom: 10px; }

        /* metrics, no border since grid gap handles separation */
        .metric { background: var(--s); padding: 14px 16px; }
        .metric span { font-size: 26px; font-weight: 600; }

        /* charts, spark needs relative so canvas sizes to wrapper */
        .spark { position: relative; height: 115px; }
        .donut-wrap { display: flex; align-items: center; gap: 14px; }
        .donut-wrap canvas { width: 100px !important; height: 100px !important; }
        .legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 11px; }
        .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .legend-name { color: var(--m); flex: 1; }

        /* table, last row has no border so it doesnt double up on card edge */
        table { width: 100%; border-collapse: collapse; }
        th { padding-bottom: 7px; border-bottom: 1px solid var(--b); text-align: left; }
        td { padding: 6px 0; border-bottom: 1px solid #1c1c1c; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }

        /* tags, shared base then color overrides per type */
        .tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
        .tag-page_view     { background: #1a2a3f; color: #4f86c6; }
        .tag-ride_posted   { background: #1a2e24; color: #57a773; }
        .tag-error         { background: #2e1a1a; color: #e05c5c; }
        .tag-seat_reserved { background: #2e251a; color: #d4933a; }
        .tag-signup        { background: #241a2e; color: #9b72cf; }

        /* bars, fill width is set inline by renderBars() */
        .bar-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 11px; }
        .bar-label { width: 85px; color: var(--m); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { flex: 1; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
        .bar-fill  { height: 100%; background: var(--a); border-radius: 2px; transition: width .3s; }

        /* controls, select input and button share base styles */
        .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        select, input, button {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            background: var(--bg);
            border: 1px solid var(--b);
            border-radius: 4px;
            color: var(--t);
            padding: 5px 9px;
            outline: none;
            cursor: pointer;
        }
        input { width: 130px; cursor: text; }
        button:hover { background: #1a1a1a; }
        button.on { background: #57a773; border-color: #57a773; color: #000; }
        .muted { color: var(--m); font-size: 11px; }
    </style>
</head>
<body>
    <p class="label" style="margin-bottom: 18px;">Event Analytics</p>

    <div class="grid4">
        <div class="metric"><p class="label" style="margin-bottom:5px">Total</p><span id="m-total">0</span></div>
        <div class="metric"><p class="label" style="margin-bottom:5px">Per Min</p><span id="m-rate">0</span></div>
        <div class="metric"><p class="label" style="margin-bottom:5px">Error Rate</p><span id="m-err">0%</span></div>
        <div class="metric"><p class="label" style="margin-bottom:5px">Pages</p><span id="m-pages">0</span></div>
    </div>

    <div class="grid21">
        <div class="surface">
            <p class="label" style="margin-bottom:10px">Volume — 5s buckets</p>
            <div class="spark"><canvas id="sparkChart"></canvas></div>
        </div>
        <div class="surface">
            <p class="label" style="margin-bottom:10px">Breakdown</p>
            <div class="donut-wrap">
                <canvas id="donutChart"></canvas>
                <div id="donut-legend"></div>
            </div>
        </div>
    </div>

    <div class="grid2">
        <div class="surface">
            <p class="label" style="margin-bottom:10px">Recent Events</p>
            <table>
                <thead><tr><th class="label">Type</th><th class="label">Page</th><th class="label">Age</th></tr></thead>
                <tbody id="event-body"></tbody>
            </table>
        </div>
        <div class="surface">
            <p class="label" style="margin-bottom:10px">Top Pages</p>
            <div id="pages-bars"></div>
        </div>
    </div>

    <div class="surface" style="margin-top:10px">
        <p class="label" style="margin-bottom:8px">Emit Event</p>
        <div class="row">
            <select id="e-type">
                <option value="page_view">page_view</option>
                <option value="ride_posted">ride_posted</option>
                <option value="error">error</option>
                <option value="seat_reserved">seat_reserved</option>
                <option value="signup">signup</option>
            </select>
            <input id="e-page" type="text" placeholder="/home" value="/home">
            <button onclick="emitManual()">Emit →</button>
            <button id="btn-auto" onclick="toggleAuto()">Auto: off</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script type="module" src="./dist/main.js"></script>
</body>
</html>
